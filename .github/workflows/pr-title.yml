name: PR Title

on:
  pull_request:
    types: [opened, reopened, edited, synchronize]

jobs:
  validate:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check title format
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const pattern = /^(chore|fix|ci|docs|feat|refactor|test|build|perf|style|revert)\(GH-\d+\): .+$/;
            if (!pattern.test(title)) {
              core.setFailed(
                `PR title "${title}" doesn't match the required format.\n` +
                `Expected: "<type>(GH-<issue>): description"\n` +
                `Example: "feat(GH-1): Add domain models"\n` +
                `Allowed types: chore, fix, ci, docs, feat, refactor, test, build, perf, style, revert`
              );
            }
