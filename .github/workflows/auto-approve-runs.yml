name: Auto-approve workflow runs

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  approve:
    name: Auto-approve pending runs
    runs-on: ubuntu-latest
    steps:
      - name: Approve pending workflow runs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const sha = context.payload.pull_request.head.sha;

            // Wait for workflow runs to be queued
            await new Promise(r => setTimeout(r, 15000));

            const { data: { workflow_runs } } = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              head_sha: sha,
              status: 'action_required',
            });

            console.log(`Found ${workflow_runs.length} runs requiring approval`);

            for (const run of workflow_runs) {
              try {
                await github.rest.actions.approveWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id,
                });
                console.log(`Approved: ${run.name} (${run.id})`);
              } catch (error) {
                console.log(`Could not approve ${run.name}: ${error.message}`);
              }
            }
