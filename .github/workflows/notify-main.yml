name: Notify hexadian-hauling-helper

on:
  push:
    branches: [main]

jobs:
  notify:
    name: Trigger Submodule Sync
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to hexadian-hauling-helper
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PROJECT_TOKEN }}
          repository: Hexadian-Corporation/hexadian-hauling-helper
          event-type: submodule-updated
